name: Build and Push Images

on:
  push:
    branches: [deploy]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build backend image
        run: docker build -t ghcr.io/tjdus/unu-backend:latest ./backend

      - name: Push backend image
        run: docker push ghcr.io/tjdus/unu-backend:latest

      - name: Build frontend image
        run: docker build -t ghcr.io/tjdus/unu-frontend:latest ./frontend

      - name: Push frontend image
        run: docker push ghcr.io/tjdus/unu-frontend:latest
