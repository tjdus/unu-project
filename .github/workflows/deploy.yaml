name: Deploy

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types:
      - completed

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy on server
        run: |
          set -e
          cd /home/deploy/app/unu-project

          git fetch origin
          git checkout deploy
          git pull origin deploy

          git submodule sync --recursive
          git submodule update --init --recursive

          docker compose pull
          docker compose up -d

          docker compose ps

      - name: Notify Slack on success
        if: success()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --data "{\"text\":\"✅ 배포 성공\nrepo: ${{ github.repository }}\nbranch: ${{ github.ref_name }}\nactor: ${{ github.actor }}\ncommit: ${{ github.sha }}\"}"

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --data "{\"text\":\"❌ 배포 실패\nrepo: ${{ github.repository }}\nbranch: ${{ github.ref_name }}\nactor: ${{ github.actor }}\ncommit: ${{ github.sha }}\"}"
