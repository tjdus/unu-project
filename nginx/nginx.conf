upstream backend {
    server backend:8080;
}

upstream frontend {
    server frontend:3000;
}

# ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Certbot 인증용 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지 모든 요청은 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # SSL 인증서 경로 (Let's Encrypt)
    # 도메인을 실제 도메인으로 변경하세요
    ssl_certificate /etc/letsencrypt/live/cnu-nu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cnu-nu.com/privkey.pem;

    # SSL 보안 설정
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # modern configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (주석 해제하면 브라우저가 HTTPS만 사용하도록 강제)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    client_max_body_size 20M;

    # ── API → Spring Boot ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Everything else → Next.js ─────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}